[build]
  # Run npm install twice: workaround for npm bug #4828 (optional deps skipped on first install)
  command = "npm install && npm run build"

[build.environment]
  NODE_VERSION = "22"

# Explicitly run the Next.js runtime adapter so SSR/API routes and routing
# are wired up. Without it Netlify publishes the repo root and every route
# returns Netlify's default 404 page.
[[plugins]]
  package = "@netlify/plugin-nextjs"
