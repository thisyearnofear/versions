<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- MODULAR: emoji-based favicon. The background is a
       cream disc with a rust center, in the same palette as
       the rest of the product. A simple bold character
       sits centered; it renders as the chosen emoji on
       platforms that have it (most do), or as a black
       rectangle as a graceful fallback. -->
  <rect width="64" height="64" rx="12" fill="#f4efe5"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="32" cy="32" r="6" fill="#1a1a1a"/>
  <line x1="32" y1="10" x2="32" y2="54" stroke="#c84a1f" stroke-width="2"/>
</svg>
