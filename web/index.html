<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERSIONS - Song Versions as Tickets</title>
    <meta name="description" content="Collect song versions like rare vinyl. Own Audius Artist Coins to unlock exclusive versions." />
    
    <style>
        :root {
            --bg-primary: #101421;
            --bg-secondary: #1a2332;
            --bg-tertiary: #252f3f;
            --fg-primary: #fffbf6;
            --fg-secondary: #8b9dc3;
            --color-purple: #9945FF;
            --color-green: #14F195;
            --color-blue: #00d4ff;
            --color-yellow: #f6c744;
            --color-red: #ff5555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--fg-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 16px; }

        /* HEADER */
        .header {
            text-align: center;
            padding: 24px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 24px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--color-purple), var(--color-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .tagline { color: var(--fg-secondary); font-size: 0.9rem; }

        /* ONBOARDING */
        .onboarding {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            transition: opacity 0.3s;
        }

        .onboarding.hidden { opacity: 0; pointer-events: none; }

        .onboarding-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 40px 28px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            border: 2px solid var(--color-purple);
        }

        .onboarding-icon { font-size: 3.5rem; margin-bottom: 16px; }
        .onboarding-title { font-size: 1.4rem; margin-bottom: 10px; color: var(--color-purple); }
        .onboarding-desc { color: var(--fg-secondary); margin-bottom: 24px; font-size: 0.9rem; }

        .onboarding-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .onboarding-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--fg-secondary); transition: all 0.3s; }
        .onboarding-dot.active { background: var(--color-purple); width: 24px; border-radius: 4px; }

        .onboarding-btn {
            background: linear-gradient(135deg, var(--color-purple), var(--color-green));
            border: none; color: white; padding: 13px 28px; font-size: 0.95rem;
            font-weight: 600; border-radius: 30px; cursor: pointer;
            transition: transform 0.2s; width: 100%; max-width: 240px;
        }

        .onboarding-btn:hover { transform: scale(1.02); }
        .onboarding-btn.secondary { background: transparent; border: 2px solid var(--fg-secondary); margin-top: 10px; }

        /* WALLET */
        .wallet-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .connect-btn {
            background: linear-gradient(135deg, var(--color-purple), var(--color-green));
            border: none; color: white; padding: 13px 26px; font-size: 0.9rem;
            font-weight: 600; border-radius: 30px; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .connect-btn:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(153,69,255,0.35); }
        .connect-btn.connected { background: var(--color-green); }

        .wallet-address { color: var(--color-blue); font-size: 0.85rem; font-family: monospace; }
        .wallet-error { color: var(--color-red); font-size: 0.85rem; padding: 8px 14px; background: rgba(255,85,85,0.1); border-radius: 8px; display: none; }
        .wallet-error.show { display: block; }

        /* SEARCH */
        .search-section { margin-bottom: 20px; }
        .search-input {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1); background: var(--bg-secondary);
            color: var(--fg-primary); font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .search-input:focus { outline: none; border-color: var(--color-purple); }
        .search-input::placeholder { color: var(--fg-secondary); }

        /* VERSION GRID */
        .versions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }

        .version-card {
            background: var(--bg-secondary); border-radius: 14px; padding: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .version-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.25); }
        .version-card.locked { opacity: 0.6; border-color: rgba(255,85,85,0.15); }
        .version-card.premium { border-color: rgba(246,199,68,0.35); }

        .track-artwork {
            width: 100%; aspect-ratio: 1; max-height: 160px;
            background: linear-gradient(135deg, var(--bg-tertiary), #3d4a5c);
            border-radius: 10px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; overflow: hidden;
        }

        .track-artwork img { width: 100%; height: 100%; object-fit: cover; }
        .track-artwork img.error { display: none; }
        .track-artwork.error::after { content: '🎵'; }

        .track-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { color: var(--color-blue); font-size: 0.8rem; margin-bottom: 8px; }

        .version-type {
            display: inline-block; padding: 3px 9px; border-radius: 20px;
            font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .version-type.demo { background: rgba(246,199,68,0.2); color: var(--color-yellow); }
        .version-type.studio { background: rgba(0,212,255,0.2); color: var(--color-blue); }
        .version-type.live { background: rgba(0,255,136,0.2); color: var(--color-green); }
        .version-type.remix { background: rgba(153,69,255,0.2); color: var(--color-purple); }
        .version-type.acoustic { background: rgba(184,197,214,0.2); color: #b8c5d6; }

        .coin-info { margin-top: 8px; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 6px; font-size: 0.7rem; }
        .coin-label { color: var(--fg-secondary); margin-bottom: 2px; }
        .coin-address { font-family: monospace; color: var(--color-purple); word-break: break-all; }

        .access-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 10px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600; margin-top: 8px;
        }

        .access-badge.unlocked { background: rgba(0,255,136,0.15); color: var(--color-green); }
        .access-badge.locked { background: rgba(255,85,85,0.15); color: var(--color-red); }

        .play-btn {
            width: 100%; padding: 10px; border-radius: 8px; border: none;
            cursor: pointer; margin-top: 10px; font-weight: 600; font-size: 0.85rem;
            transition: all 0.2s;
        }

        .play-btn.primary { background: var(--color-purple); color: white; }
        .play-btn.primary:hover { background: #b366ff; }
        .play-btn.secondary { background: transparent; border: 2px solid var(--color-purple); color: var(--color-purple); }
        .play-btn:disabled { background: #333; color: #666; cursor: not-allowed; border-color: #333; }

        /* LOADING */
        .loading-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
        .loading-skeleton {
            height: 280px; border-radius: 14px;
            background: linear-gradient(90deg, var(--bg-secondary) 25%, var(--bg-tertiary) 50%, var(--bg-secondary) 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* EMPTY/ERROR */
        .empty-state { text-align: center; padding: 50px 20px; color: var(--fg-secondary); }
        .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

        /* AUDIO PLAYER */
        .audio-player {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 16px;
            display: none; z-index: 100;
        }
        .audio-player.active { display: block; }

        .player-content {
            max-width: 900px; margin: 0 auto;
            display: flex; align-items: center; gap: 12px;
        }

        .player-artwork {
            width: 48px; height: 48px; border-radius: 8px;
            background: var(--bg-tertiary);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; overflow: hidden; flex-shrink: 0;
        }
        .player-artwork img { width: 100%; height: 100%; object-fit: cover; }

        .player-info { flex: 1; min-width: 0; }
        .player-title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { color: var(--color-blue); font-size: 0.8rem; }

        .player-controls { display: flex; align-items: center; gap: 8px; }
        .player-btn {
            background: none; border: none; color: var(--fg-primary);
            font-size: 1.5rem; cursor: pointer; padding: 8px;
            border-radius: 50%; transition: background 0.2s;
        }
        .player-btn:hover { background: rgba(255,255,255,0.1); }

        .player-progress { flex: 1; max-width: 200px; display: flex; align-items: center; gap: 8px; }
        .progress-bar {
            flex: 1; height: 4px; background: var(--bg-tertiary);
            border-radius: 2px; cursor: pointer;
        }
        .progress-fill {
            height: 100%; background: var(--color-purple);
            border-radius: 2px; width: 0%; transition: width 0.1s;
        }

        .progress-time { font-size: 0.7rem; color: var(--fg-secondary); font-family: monospace; min-width: 40px; }
        .player-close { background: none; border: none; color: var(--fg-secondary); font-size: 1.2rem; cursor: pointer; padding: 4px; }

        /* FOOTER */
        .footer {
            text-align: center; padding: 30px 16px; color: var(--fg-secondary);
            font-size: 0.75rem; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 40px;
            padding-bottom: 80px;
        }
        .footer a { color: var(--color-purple); text-decoration: none; }

        /* MODALS */
        .error-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--bg-secondary); border-radius: 16px; padding: 20px;
            border: 2px solid var(--color-red); z-index: 1001;
            display: none; max-width: 400px; width: 90%;
        }
        .error-modal.show { display: block; }
        .error-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .error-modal-title { font-weight: 600; font-size: 1.1rem; }
        .error-modal-close { background: none; border: none; color: var(--fg-secondary); font-size: 1.2rem; cursor: pointer; }
        .error-modal-content { color: var(--fg-secondary); font-size: 0.9rem; margin-bottom: 16px; }
        .error-modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .error-modal-btn {
            padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600;
        }
        .error-modal-btn.primary { background: var(--color-purple); color: white; }
        .error-modal-btn.secondary { background: transparent; border: 2px solid var(--fg-secondary); color: var(--fg-secondary); }

        /* MOBILE */
        @media (max-width: 480px) {
            .container { padding: 12px; }
            .header { padding: 18px 12px; }
            .logo { font-size: 1.5rem; }
            .versions-grid { grid-template-columns: 1fr; gap: 12px; }
            .onboarding-card { padding: 28px 20px; }
            .onboarding-title { font-size: 1.2rem; }
            .connect-btn { width: 100%; justify-content: center; }
            .player-progress { display: none; }
        }
    </style>
</head>

<body>
    <!-- ONBOARDING -->
    <div class="onboarding" id="onboarding">
        <div class="onboarding-card">
            <div class="onboarding-icon" id="onboardingIcon">🎵</div>
            <h2 class="onboarding-title" id="onboardingTitle">Collect Song Versions</h2>
            <p class="onboarding-desc" id="onboardingDesc">Like rare vinyl, but digital. Each version of a song becomes a collectible.</p>
            <div class="onboarding-dots">
                <div class="onboarding-dot active" data-step="0"></div>
                <div class="onboarding-dot" data-step="1"></div>
                <div class="onboarding-dot" data-step="2"></div>
            </div>
            <button class="onboarding-btn" id="onboardingBtn" onclick="nextOnboardingStep()">Next</button>
            <button class="onboarding-btn secondary" onclick="skipOnboarding()">Skip</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="container">
        <header class="header">
            <div class="logo">VERSIONS</div>
            <p class="tagline">Song versions as tickets — own the artist coin, unlock the version</p>
        </header>

        <section class="wallet-section">
            <button id="connectBtn" class="connect-btn" onclick="handleWalletConnect()">
                <span>🔗</span><span>Connect Wallet</span>
            </button>
            <div id="walletAddress" class="wallet-address"></div>
            <div id="walletError" class="wallet-error"></div>
        </section>

        <section class="search-section">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search songs or artists..." oninput="handleSearch(this.value)">
        </section>

        <div id="versionsContainer">
            <div class="loading-grid">
                <div class="loading-skeleton"></div>
                <div class="loading-skeleton"></div>
                <div class="loading-skeleton"></div>
            </div>
        </div>

        <footer class="footer">
            Built for <a href="https://solana.com/graveyard-hack" target="_blank">Solana Graveyard Hackathon</a><br>
            Audius Track — "Versions as Tickets"
        </footer>
    </div>

    <!-- AUDIO PLAYER -->
    <div class="audio-player" id="audioPlayer">
        <div class="player-content">
            <div class="player-artwork" id="playerArtwork">🎵</div>
            <div class="player-info">
                <div class="player-title" id="playerTitle">-</div>
                <div class="player-artist" id="playerArtist">-</div>
            </div>
            <div class="player-controls">
                <button class="player-btn" id="playPauseBtn" onclick="togglePlayPause()">▶</button>
            </div>
            <div class="player-progress">
                <span class="progress-time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar" onclick="seekAudio(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="progress-time" id="totalTime">0:00</span>
            </div>
            <button class="player-close" onclick="closePlayer()">✕</button>
        </div>
    </div>

    <!-- ERROR MODAL -->
    <div class="error-modal" id="errorModal">
        <div class="error-modal-header">
            <div class="error-modal-title" id="errorModalTitle">Error</div>
            <button class="error-modal-close" onclick="closeErrorModal()">✕</button>
        </div>
        <div class="error-modal-content" id="errorModalContent"></div>
        <div class="error-modal-actions" id="errorModalActions"></div>
    </div>

    <script src="./audius-solana.js"></script>
    <script>
        // STATE
        let walletConnected = false;
        let walletAddress = '';
        let allVersions = [];
        let filteredVersions = [];
        let onboardingStep = 0;
        let isLoading = true;
        let verifiedOwnership = {};

        // AUDIO PLAYER STATE
        let currentAudio = null;
        let currentVersion = null;
        let isPlaying = false;

        const onboardingData = [
            { icon: '🎵', title: 'Collect Song Versions', desc: 'Like rare vinyl, but digital. Each version of a song - demo, live, studio - becomes a collectible.' },
            { icon: '🪙', title: 'Own the Artist Coin', desc: 'Audius Artist Coins represent ownership in an artist. Hold the coin to unlock their exclusive versions.' },
            { icon: '🔓', title: 'Connect & Unlock', desc: 'Connect your Solana wallet. If you own the artist coin, the version unlocks instantly!' }
        ];

        // ONBOARDING
        function nextOnboardingStep() {
            if (onboardingStep < 2) { onboardingStep++; updateOnboarding(); }
            else { skipOnboarding(); }
        }

        function updateOnboarding() {
            const data = onboardingData[onboardingStep];
            document.getElementById('onboardingIcon').textContent = data.icon;
            document.getElementById('onboardingTitle').textContent = data.title;
            document.getElementById('onboardingDesc').textContent = data.desc;
            document.querySelectorAll('.onboarding-dot').forEach((dot, i) => dot.classList.toggle('active', i === onboardingStep));
            document.getElementById('onboardingBtn').textContent = onboardingStep === 2 ? 'Get Started' : 'Next';
        }

        function skipOnboarding() {
            document.getElementById('onboarding').classList.add('hidden');
            localStorage.setItem('onboarding_complete', 'true');
        }

        if (localStorage.getItem('onboarding_complete') === 'true') {
            document.getElementById('onboarding').classList.add('hidden');
        }

        // WALLET
        async function handleWalletConnect() {
            const errorEl = document.getElementById('walletError');
            errorEl.classList.remove('show');
            const hasWallet = window.phantom?.solana || window.solana;
            
            if (!hasWallet) {
                errorEl.innerHTML = 'No wallet found. <a href="https://phantom.app" target="_blank" style="color:var(--color-purple)">Install Phantom</a>';
                errorEl.classList.add('show');
                return;
            }

            try {
                const result = await window.AudiusSolanaIntegration.connectWallet();
                if (result) {
                    walletConnected = true;
                    walletAddress = result.address;
                    updateWalletUI();
                    await verifyPremiumAccess();
                    renderVersions();
                }
            } catch (error) {
                errorEl.textContent = 'Connection failed. Try again.';
                errorEl.classList.add('show');
            }
        }

        function updateWalletUI() {
            const btn = document.getElementById('connectBtn');
            const addrEl = document.getElementById('walletAddress');
            if (walletConnected) {
                btn.classList.add('connected');
                btn.innerHTML = '<span>✓</span><span>Connected</span>';
                addrEl.textContent = walletAddress.slice(0, 6) + '...' + walletAddress.slice(-4);
            }
        }

        // OWNERSHIP VERIFICATION
        async function verifyPremiumAccess() {
            showLoading('Verifying Ownership', 'Checking your token holdings...');
            
            for (const version of allVersions) {
                if (version.premium && version.coinAddress) {
                    try {
                        const result = await window.AudiusSolanaIntegration.verifyOwnership(version.coinAddress);
                        verifiedOwnership[version.id] = result.owned;
                    } catch (e) {
                        console.error('Ownership check failed:', e);
                        verifiedOwnership[version.id] = false;
                    }
                }
            }
            
            hideLoading();
            console.log('Verified ownership:', verifiedOwnership);
        }

        // DATA
        async function loadAudiusTracks() {
            isLoading = true;
            renderVersions();

            try {
                const tracks = await window.AudiusSolanaIntegration.initAudius();
                if (tracks && tracks.length > 0) {
                    allVersions = tracks.slice(0, 18).map((track, index) => ({
                        id: `audius-${track.id}`,
                        title: track.title || 'Unknown Track',
                        artist: track.user?.name || 'Unknown Artist',
                        artistId: track.user?.id || '',
                        type: ['demo', 'studio', 'live', 'remix', 'acoustic'][index % 5],
                        artwork: track.artwork?.['480x480'] || track.artwork?.['150x150'],
                        duration: track.duration,
                        streamUrl: track.stream_url,
                        coinAddress: track.user?.id ? `artist_${track.user.id}` : `mock_${index}`,
                        premium: index % 3 === 0
                    }));
                } else {
                    allVersions = getDemoVersions();
                }
            } catch (error) {
                console.error('Failed to load Audius tracks:', error);
                allVersions = getDemoVersions();
            }

            isLoading = false;
            filteredVersions = [...allVersions];
            renderVersions();
        }

        function getDemoVersions() {
            return [
                { id: 'v1', title: 'Bohemian Rhapsody', artist: 'Queen', type: 'studio', coinAddress: 'queen_coin', premium: true },
                { id: 'v2', title: 'Bohemian Rhapsody', artist: 'Queen', type: 'live', coinAddress: 'queen_coin', premium: false },
                { id: 'v3', title: 'Imagine', artist: 'John Lennon', type: 'studio', coinAddress: 'lennon_coin', premium: true },
                { id: 'v4', title: 'Imagine', artist: 'John Lennon', type: 'acoustic', coinAddress: 'lennon_coin', premium: false },
                { id: 'v5', title: 'Hotel California', artist: 'Eagles', type: 'live', coinAddress: 'eagles_coin', premium: true },
                { id: 'v6', title: 'Hotel California', artist: 'Eagles', type: 'demo', coinAddress: 'eagles_coin', premium: false },
            ];
        }

        // SEARCH
        function handleSearch(query) {
            if (!query.trim()) { filteredVersions = [...allVersions]; }
            else {
                const q = query.toLowerCase();
                filteredVersions = allVersions.filter(v => v.title.toLowerCase().includes(q) || v.artist.toLowerCase().includes(q));
            }
            renderVersions();
        }

        // RENDER
        function renderVersions() {
            const container = document.getElementById('versionsContainer');

            if (isLoading) {
                container.innerHTML = '<div class="loading-grid"><div class="loading-skeleton"></div><div class="loading-skeleton"></div><div class="loading-skeleton"></div></div>';
                return;
            }

            if (filteredVersions.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><p>No versions found</p></div>';
                return;
            }

            container.innerHTML = `<div class="versions-grid">${filteredVersions.map(renderVersionCard).join('')}</div>`;
        }

        function renderVersionCard(version) {
            const isUnlocked = !version.premium || verifiedOwnership[version.id] === true;
            return `
                <div class="version-card ${isUnlocked ? '' : 'locked'} ${version.premium ? 'premium' : ''}">
                    <div class="track-artwork ${version.artwork ? '' : 'error'}">
                        ${version.artwork ? `<img src="${version.artwork}" alt="${version.title}" onerror="this.classList.add('error')">` : ''}
                    </div>
                    <div class="track-title">${version.title}</div>
                    <div class="track-artist">${version.artist}</div>
                    <span class="version-type ${version.type}">${version.type}</span>
                    ${version.premium ? `<div class="coin-info"><div class="coin-label">🎫 Required: Artist Coin</div><div class="coin-address">${version.coinAddress.slice(0, 16)}...</div></div>` : ''}
                    <div class="access-badge ${isUnlocked ? 'unlocked' : 'locked'}">${isUnlocked ? '✓ Unlocked' : '🔒 Locked'}</div>
                    <button class="play-btn ${isUnlocked ? 'primary' : 'secondary'}" onclick="playVersion('${version.id}')">${isUnlocked ? '▶ Play' : '🔗 Connect to Unlock'}</button>
                </div>
            `;
        }

        // PLAYBACK
        function playVersion(versionId) {
            const version = allVersions.find(v => v.id === versionId);
            if (!version) return;
            
            const isUnlocked = !version.premium || verifiedOwnership[version.id] === true;
            
            if (version.premium && !isUnlocked) {
                handleWalletConnect();
                return;
            }

            if (!version.streamUrl) {
                showErrorModal('Playback Error', 'This version is not available for streaming. Connect your wallet to verify ownership.', [
                    { text: 'Connect Wallet', action: handleWalletConnect, primary: true },
                    { text: 'Close', action: closeErrorModal }
                ]);
                return;
            }

            playAudio(version);
        }

        function playAudio(version) {
            currentVersion = version;
            
            document.getElementById('playerTitle').textContent = version.title;
            document.getElementById('playerArtist').textContent = version.artist;
            
            const artworkEl = document.getElementById('playerArtwork');
            if (version.artwork) {
                artworkEl.innerHTML = `<img src="${version.artwork}" alt="${version.title}">`;
            } else {
                artworkEl.textContent = '🎵';
            }
            
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('currentTime').textContent = '0:00';
            document.getElementById('totalTime').textContent = '0:00';
            document.getElementById('audioPlayer').classList.add('active');
            
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            
            currentAudio = new Audio(version.streamUrl);
            
            currentAudio.addEventListener('loadedmetadata', () => {
                document.getElementById('totalTime').textContent = formatTime(currentAudio.duration);
            });
            
            currentAudio.addEventListener('timeupdate', () => {
                const progress = (currentAudio.currentTime / currentAudio.duration) * 100;
                document.getElementById('progressFill').style.width = progress + '%';
                document.getElementById('currentTime').textContent = formatTime(currentAudio.currentTime);
            });
            
            currentAudio.addEventListener('ended', () => {
                isPlaying = false;
                document.getElementById('playPauseBtn').textContent = '▶';
            });
            
            currentAudio.play().then(() => {
                isPlaying = true;
                document.getElementById('playPauseBtn').textContent = '⏸';
            }).catch(err => {
                console.error('Playback error:', err);
                showErrorModal('Playback Error', 'Could not play audio stream.');
            });
        }

        function togglePlayPause() {
            if (!currentAudio) return;
            if (isPlaying) {
                currentAudio.pause();
                document.getElementById('playPauseBtn').textContent = '▶';
                isPlaying = false;
            } else {
                currentAudio.play();
                document.getElementById('playPauseBtn').textContent = '⏸';
                isPlaying = true;
            }
        }

        function seekAudio(event) {
            if (!currentAudio) return;
            const bar = document.getElementById('progressBar');
            const rect = bar.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            currentAudio.currentTime = percent * currentAudio.duration;
        }

        function closePlayer() {
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            isPlaying = false;
            currentVersion = null;
            document.getElementById('audioPlayer').classList.remove('active');
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // MODALS
        function showErrorModal(title, message, actions = []) {
            document.getElementById('errorModalTitle').textContent = title;
            document.getElementById('errorModalContent').textContent = message;
            
            const actionsEl = document.getElementById('errorModalActions');
            actionsEl.innerHTML = actions.map((a, i) => 
                `<button class="error-modal-btn ${a.primary ? 'primary' : 'secondary'}" onclick="${a.action.toString().replace(/function\s*\(\)\s*{/, '').replace(/}$/, '')}">${a.text}</button>`
            ).join('');
            
            document.getElementById('errorModal').classList.add('show');
        }

        function closeErrorModal() {
            document.getElementById('errorModal').classList.remove('show');
        }

        function showLoading(title, message) {
            const overlay = document.createElement('div');
            overlay.className = 'onboarding';
            overlay.id = 'loadingOverlay';
            overlay.innerHTML = `
                <div class="onboarding-card">
                    <div class="onboarding-icon">🔄</div>
                    <h2 class="onboarding-title">${title}</h2>
                    <p class="onboarding-desc">${message}</p>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.remove();
        }

        // INIT
        document.addEventListener('DOMContentLoaded', loadAudiusTracks);
    </script>
</body>
</html>
