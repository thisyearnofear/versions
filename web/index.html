<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERSIONS - Song Versions as Tickets</title>
    <meta name="description" content="Collect song versions like rare vinyl. Own Audius Artist Coins to unlock exclusive versions." />
    
    <style>
        :root {
            --bg-primary: #101421;
            --bg-secondary: #1a2332;
            --bg-tertiary: #252f3f;
            --fg-primary: #fffbf6;
            --fg-secondary: #8b9dc3;
            --color-purple: #9945FF;
            --color-green: #14F195;
            --color-blue: #00d4ff;
            --color-yellow: #f6c744;
            --color-red: #ff5555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--fg-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 16px; }

        /* HEADER */
        .header {
            text-align: center;
            padding: 24px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 24px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--color-purple), var(--color-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .tagline { color: var(--fg-secondary); font-size: 0.9rem; }

        /* ONBOARDING */
        .onboarding {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            transition: opacity 0.3s;
        }

        .onboarding.hidden { opacity: 0; pointer-events: none; }

        .onboarding-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 40px 28px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            border: 2px solid var(--color-purple);
        }

        .onboarding-icon { font-size: 3.5rem; margin-bottom: 16px; }
        .onboarding-title { font-size: 1.4rem; margin-bottom: 10px; color: var(--color-purple); }
        .onboarding-desc { color: var(--fg-secondary); margin-bottom: 24px; font-size: 0.9rem; }

        .onboarding-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .onboarding-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--fg-secondary); transition: all 0.3s; }
        .onboarding-dot.active { background: var(--color-purple); width: 24px; border-radius: 4px; }

        .onboarding-btn {
            background: linear-gradient(135deg, var(--color-purple), var(--color-green));
            border: none; color: white; padding: 13px 28px; font-size: 0.95rem;
            font-weight: 600; border-radius: 30px; cursor: pointer;
            transition: transform 0.2s; width: 100%; max-width: 240px;
        }

        .onboarding-btn:hover { transform: scale(1.02); }
        .onboarding-btn.secondary { background: transparent; border: 2px solid var(--fg-secondary); margin-top: 10px; }

        /* WALLET */
        .wallet-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .connect-btn {
            background: linear-gradient(135deg, var(--color-purple), var(--color-green));
            border: none; color: white; padding: 13px 26px; font-size: 0.9rem;
            font-weight: 600; border-radius: 30px; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .connect-btn:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(153,69,255,0.35); }
        .connect-btn.connected { background: var(--color-green); }

        .wallet-address { color: var(--color-blue); font-size: 0.85rem; font-family: monospace; }
        .wallet-error { color: var(--color-red); font-size: 0.85rem; padding: 8px 14px; background: rgba(255,85,85,0.1); border-radius: 8px; display: none; }
        .wallet-error.show { display: block; }

        /* SEARCH */
        .search-section { margin-bottom: 20px; }
        .search-input {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1); background: var(--bg-secondary);
            color: var(--fg-primary); font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .search-input:focus { outline: none; border-color: var(--color-purple); }
        .search-input::placeholder { color: var(--fg-secondary); }

        /* VERSION GRID */
        .versions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }

        .version-card {
            background: var(--bg-secondary); border-radius: 14px; padding: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .version-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.25); }
        .version-card.locked { opacity: 0.6; border-color: rgba(255,85,85,0.15); }
        .version-card.premium { border-color: rgba(246,199,68,0.35); }

        .track-artwork {
            width: 100%; aspect-ratio: 1; max-height: 160px;
            background: linear-gradient(135deg, var(--bg-tertiary), #3d4a5c);
            border-radius: 10px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; overflow: hidden;
        }

        .track-artwork img { width: 100%; height: 100%; object-fit: cover; }
        .track-artwork img.error { display: none; }
        .track-artwork.error::after { content: '🎵'; }

        .track-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { color: var(--color-blue); font-size: 0.8rem; margin-bottom: 8px; }

        .version-type {
            display: inline-block; padding: 3px 9px; border-radius: 20px;
            font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .version-type.demo { background: rgba(246,199,68,0.2); color: var(--color-yellow); }
        .version-type.studio { background: rgba(0,212,255,0.2); color: var(--color-blue); }
        .version-type.live { background: rgba(0,255,136,0.2); color: var(--color-green); }
        .version-type.remix { background: rgba(153,69,255,0.2); color: var(--color-purple); }
        .version-type.acoustic { background: rgba(184,197,214,0.2); color: #b8c5d6; }

        .coin-info { margin-top: 8px; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 6px; font-size: 0.7rem; }
        .coin-label { color: var(--fg-secondary); margin-bottom: 2px; }
        .coin-address { font-family: monospace; color: var(--color-purple); word-break: break-all; }

        .access-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 10px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600; margin-top: 8px;
        }

        .access-badge.unlocked { background: rgba(0,255,136,0.15); color: var(--color-green); }
        .access-badge.locked { background: rgba(255,85,85,0.15); color: var(--color-red); }

        .play-btn {
            width: 100%; padding: 10px; border-radius: 8px; border: none;
            cursor: pointer; margin-top: 10px; font-weight: 600; font-size: 0.85rem;
            transition: all 0.2s;
        }

        .play-btn.primary { background: var(--color-purple); color: white; }
        .play-btn.primary:hover { background: #b366ff; }
        .play-btn.secondary { background: transparent; border: 2px solid var(--color-purple); color: var(--color-purple); }
        .play-btn:disabled { background: #333; color: #666; cursor: not-allowed; border-color: #333; }

        /* LOADING */
        .loading-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
        .loading-skeleton {
            height: 280px; border-radius: 14px;
            background: linear-gradient(90deg, var(--bg-secondary) 25%, var(--bg-tertiary) 50%, var(--bg-secondary) 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* EMPTY/ERROR */
        .empty-state { text-align: center; padding: 50px 20px; color: var(--fg-secondary); }
        .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

        /* AUDIO PLAYER */
        .audio-player {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 16px;
            display: none; z-index: 100;
        }
        .audio-player.active { display: block; }

        .player-content {
            max-width: 900px; margin: 0 auto;
            display: flex; align-items: center; gap: 12px;
        }

        .player-artwork {
            width: 48px; height: 48px; border-radius: 8px;
            background: var(--bg-tertiary);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; overflow: hidden; flex-shrink: 0;
        }
        .player-artwork img { width: 100%; height: 100%; object-fit: cover; }

        .player-info { flex: 1; min-width: 0; }
        .player-title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { color: var(--color-blue); font-size: 0.8rem; }

        .player-controls { display: flex; align-items: center; gap: 8px; }
        .player-btn {
            background: none; border: none; color: var(--fg-primary);
            font-size: 1.5rem; cursor: pointer; padding: 8px;
            border-radius: 50%; transition: background 0.2s;
        }
        .player-btn:hover { background: rgba(255,255,255,0.1); }

        .player-progress { flex: 1; max-width: 200px; display: flex; align-items: center; gap: 8px; }
        .progress-bar {
            flex: 1; height: 4px; background: var(--bg-tertiary);
            border-radius: 2px; cursor: pointer;
        }
        .progress-fill {
            height: 100%; background: var(--color-purple);
            border-radius: 2px; width: 0%; transition: width 0.1s;
        }

        .progress-time { font-size: 0.7rem; color: var(--fg-secondary); font-family: monospace; min-width: 40px; }
        .player-close { background: none; border: none; color: var(--fg-secondary); font-size: 1.2rem; cursor: pointer; padding: 4px; }

        /* FOOTER */
        .footer {
            text-align: center; padding: 30px 16px; color: var(--fg-secondary);
            font-size: 0.75rem; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 40px;
            padding-bottom: 80px;
        }
        .footer a { color: var(--color-purple); text-decoration: none; }

        /* MODALS */
        .error-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--bg-secondary); border-radius: 16px; padding: 20px;
            border: 2px solid var(--color-red); z-index: 1001;
            display: none; max-width: 400px; width: 90%;
        }
        .error-modal.show { display: block; }
        .error-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .error-modal-title { font-weight: 600; font-size: 1.1rem; }
        .error-modal-close { background: none; border: none; color: var(--fg-secondary); font-size: 1.2rem; cursor: pointer; }
        .error-modal-content { color: var(--fg-secondary); font-size: 0.9rem; margin-bottom: 16px; }
        .error-modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .error-modal-btn {
            padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600;
        }
        .error-modal-btn.primary { background: var(--color-purple); color: white; }
        .error-modal-btn.secondary { background: transparent; border: 2px solid var(--fg-secondary); color: var(--fg-secondary); }

        /* MOBILE */
        @media (max-width: 480px) {
            .container { padding: 12px; }
            .header { padding: 18px 12px; }
            .logo { font-size: 1.5rem; }
            .versions-grid { grid-template-columns: 1fr; gap: 12px; }
            .onboarding-card { padding: 28px 20px; }
            .onboarding-title { font-size: 1.2rem; }
            .connect-btn { width: 100%; justify-content: center; }
            .player-progress { display: none; }
        }

        /* ENHANCED MOBILE EXPERIENCE */
        @media (max-width: 480px) {
            /* Improved touch targets */
            .connect-btn, .play-btn, .error-modal-btn {
                min-height: 44px;
                min-width: 44px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* Better spacing for mobile */
            .wallet-section { gap: 8px; margin-bottom: 16px; }
            .wallet-address { font-size: 0.75rem; text-align: center; }
            .search-section { margin-bottom: 16px; }
            .search-input { padding: 10px 12px; font-size: 0.85rem; }
            .version-card { padding: 12px; border-radius: 12px; }
            .track-artwork { max-height: 120px; margin-bottom: 8px; }
            .track-title { font-size: 0.85rem; margin-bottom: 2px; }
            .track-artist { font-size: 0.7rem; margin-bottom: 6px; }
            .version-type { font-size: 0.55rem; padding: 2px 6px; }
            .coin-info { padding: 6px; font-size: 0.6rem; }
            .coin-label { margin-bottom: 1px; }
            .coin-address { font-size: 0.55rem; }
            .access-badge { font-size: 0.65rem; padding: 3px 8px; margin-top: 6px; }
            .play-btn { padding: 8px; font-size: 0.75rem; margin-top: 6px; }

            /* Enhanced empty states */
            .empty-state { padding: 40px 16px; margin: 16px; }
            .empty-icon { font-size: 2rem; margin-bottom: 10px; }
            .empty-title { font-size: 1rem; margin-bottom: 6px; }
            .empty-desc { margin-bottom: 16px; font-size: 0.85rem; }
            .empty-actions { flex-direction: column; gap: 8px; }

            /* Enhanced error states */
            .error-state { padding: 40px 16px; margin: 16px; }
            .error-state .error-title { font-size: 1rem; }
            .error-state .error-desc { font-size: 0.85rem; margin-bottom: 16px; }
            .error-state .error-actions { flex-direction: column; gap: 8px; }

            /* Better footer */
            .footer { padding: 20px 16px; font-size: 0.65rem; }
            .footer br { display: none; }

            /* Improved audio player */
            .audio-player { padding: 10px 12px; }
            .player-content { gap: 8px; }
            .player-artwork { width: 40px; height: 40px; font-size: 1.2rem; }
            .player-info { flex: 1; }
            .player-title { font-size: 0.8rem; }
            .player-artist { font-size: 0.65rem; }
            .player-controls { gap: 6px; }
            .player-btn { font-size: 1.2rem; padding: 6px; }
            .player-close { font-size: 1rem; padding: 3px; }
        }

        /* SMALL TABLETS */
        @media (min-width: 481px) and (max-width: 768px) {
            .container { padding: 16px; }
            .header { padding: 20px 16px; }
            .logo { font-size: 1.7rem; }
            .versions-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
            .onboarding-card { padding: 28px 20px; max-width: 420px; }
            .onboarding-title { font-size: 1.3rem; }
            .connect-btn { width: 100%; justify-content: center; padding: 11px 24px; font-size: 0.9rem; }
            .wallet-section { gap: 10px; margin-bottom: 20px; }
            .wallet-address { font-size: 0.8rem; text-align: center; }
            .search-section { margin-bottom: 18px; }
            .search-input { padding: 11px 16px; font-size: 0.9rem; }
            .version-card { padding: 14px; border-radius: 14px; }
            .track-artwork { max-height: 140px; margin-bottom: 10px; }
            .track-title { font-size: 0.9rem; margin-bottom: 2px; }
            .track-artist { font-size: 0.75rem; margin-bottom: 8px; }
            .version-type { font-size: 0.6rem; padding: 3px 8px; }
            .coin-info { padding: 7px; font-size: 0.65rem; }
            .coin-label { margin-bottom: 2px; }
            .coin-address { font-size: 0.6rem; }
            .access-badge { font-size: 0.7rem; padding: 4px 9px; margin-top: 8px; }
            .play-btn { padding: 9px; font-size: 0.8rem; margin-top: 8px; }
            .empty-state { padding: 45px 20px; margin: 20px; }
            .empty-icon { font-size: 2.2rem; margin-bottom: 12px; }
            .empty-title { font-size: 1.1rem; margin-bottom: 8px; }
            .empty-desc { margin-bottom: 18px; font-size: 0.9rem; }
            .empty-actions { flex-direction: column; gap: 10px; }
            .error-state { padding: 45px 20px; margin: 20px; }
            .error-state .error-title { font-size: 1.1rem; }
            .error-state .error-desc { font-size: 0.9rem; margin-bottom: 18px; }
            .error-state .error-actions { flex-direction: column; gap: 10px; }
            .footer { padding: 25px 16px; font-size: 0.7rem; }
        }

        /* LARGE TABLETS */
        @media (min-width: 769px) and (max-width: 1024px) {
            .container { padding: 20px; }
            .header { padding: 22px 16px; }
            .logo { font-size: 1.75rem; }
            .versions-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
            .onboarding-card { padding: 30px 22px; max-width: 440px; }
            .onboarding-title { font-size: 1.35rem; }
            .connect-btn { width: 100%; justify-content: center; padding: 12px 26px; font-size: 0.95rem; }
            .wallet-section { gap: 12px; margin-bottom: 22px; }
            .wallet-address { font-size: 0.85rem; text-align: center; }
            .search-section { margin-bottom: 20px; }
            .search-input { padding: 12px 18px; font-size: 0.95rem; }
            .version-card { padding: 15px; border-radius: 15px; }
            .track-artwork { max-height: 150px; margin-bottom: 12px; }
            .track-title { font-size: 0.95rem; margin-bottom: 3px; }
            .track-artist { font-size: 0.8rem; margin-bottom: 9px; }
            .version-type { font-size: 0.65rem; padding: 3px 9px; }
            .coin-info { padding: 8px; font-size: 0.7rem; }
            .coin-label { margin-bottom: 2px; }
            .coin-address { font-size: 0.65rem; }
            .access-badge { font-size: 0.75rem; padding: 4px 10px; margin-top: 9px; }
            .play-btn { padding: 10px; font-size: 0.85rem; margin-top: 9px; }
            .empty-state { padding: 50px 22px; margin: 22px; }
            .empty-icon { font-size: 2.3rem; margin-bottom: 13
