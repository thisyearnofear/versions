name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint (syntax)
        # DRY: every JS file in proxy/ and web/lib/ must parse. No babel,
        # no eslint — node --check is the cheapest possible gate.
        run: |
          node --check proxy-server.js
          find proxy -name '*.js' -not -path '*/__tests__/*' -print0 | xargs -0 -n1 node --check
          find web/lib -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Test
        run: npm test

      - name: Doctor (env + readiness)
        # CLEAN: the proxy must boot and serve /health/ready on the
        # default port. We don't make any HTTP calls in this job.
        run: |
          PORT=18099 node proxy-server.js &
          PID=$!
          sleep 2
          curl -sS http://127.0.0.1:18099/health/ready | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['success'], d; print('ready:', d['data']['status'])"
          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true
