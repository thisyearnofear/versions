# MODULAR: Railway auto-detects the Dockerfile. One service, one
# port. The proxy binds 0.0.0.0:8080 by default; Railway sets
# PORT and the proxy honours it.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node proxy-server.js"
healthcheckPath = "/health/ready"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
